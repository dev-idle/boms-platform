version: "2"
sql:
  - engine: "postgresql"
    # DDL for sqlc analysis — keep aligned with Neon / migration tool output.
    schema: "internal/adapter/repository/postgres/sql/schema"
    queries: "internal/adapter/repository/postgres/sql/query"
    strict_function_checks: true
    strict_order_by: true
    gen:
      go:
        package: "sqlcgen"
        out: "internal/adapter/repository/postgres/sqlcgen"
        sql_package: "database/sql"
        sql_driver: "github.com/jackc/pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_sql_as_comment: true
        json_tags_case_style: "camel"
        omit_unused_structs: true
